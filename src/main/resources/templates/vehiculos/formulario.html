<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Formulario Vehículo</title>
    <link rel="stylesheet" th:href="@{/css/styles.css}">
</head>
<body>

<header>
    <h1>AlquilaTusVehiculos</h1>
    <p>Formulario de vehículos</p>
</header>

<nav>
    <a th:href="@{/}">Inicio</a>
    <a th:href="@{/vehiculos}">Vehículos</a>
    <a th:href="@{/clientes}">Clientes</a>
    <a th:href="@{/alquileres}">Alquileres</a>
</nav>

<main>
    <h2 th:text="${vehiculo.idVehiculo == null} ? 'Nuevo Vehículo' : 'Editar Vehículo'"></h2>

    <form th:action="@{/vehiculos/guardar}" th:object="${vehiculo}" method="post">

        <input type="hidden" th:field="*{idVehiculo}" />

        <div class="form-group">
            <label>Matrícula</label>
            <input type="text" th:field="*{matricula}" required>
        </div>

        <div class="form-group">
            <label>Marca</label>
            <input type="text" th:field="*{marca}" required>
        </div>

        <div class="form-group">
            <label>Modelo</label>
            <input type="text" th:field="*{modelo}" required>
        </div>

        <div class="form-group">
            <label>Tipo</label>
            <input type="text" th:field="*{tipo}" required>
        </div>

        <div class="form-group">
            <label>Precio por día</label>
            <input type="number" step="0.01" th:field="*{precioDia}" required>
        </div>

        <div class="form-group">
            <label>Estado</label>
            <select th:field="*{estado}">
                <option th:each="estado : ${estados}"
                        th:value="${estado}"
                        th:text="${estado}">
                </option>
            </select>
        </div>

        <div class="actions">
            <button type="submit">Guardar</button>
            <a class="button btn-secondary" th:href="@{/vehiculos}">Cancelar</a>
        </div>
    </form>
</main>

</body>
</html>
