<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Clientes - AlquilaTusVehiculos</title>
    <link rel="stylesheet" th:href="@{/css/styles.css}">
</head>
<body>

<header>
    <h1>AlquilaTusVehiculos</h1>
    <p>Clientes registrados</p>
</header>

<nav>
    <a th:href="@{/}">Inicio</a>
    <a th:href="@{/vehiculos}">Vehículos</a>
    <a th:href="@{/clientes}">Clientes</a>
    <a th:href="@{/alquileres}">Alquileres</a>
</nav>

<main>
    <h2>Lista de Clientes</h2>

    <table>
        <thead>
        <tr>
            <th>ID</th>
            <th>Nombre</th>
            <th>Apellidos</th>
            <th>DNI</th>
            <th>Teléfono</th>
            <th>Fecha creación</th>
        </tr>
        </thead>
        <tbody>
        <tr th:each="cliente : ${clientes}">
            <td th:text="${cliente.idCliente}"></td>
            <td th:text="${cliente.nombre}"></td>
            <td th:text="${cliente.apellidos}"></td>
            <td th:text="${cliente.dni}"></td>
            <td th:text="${cliente.telefono}"></td>
            <td th:text="${cliente.createdAt}"></td>
        </tr>
        </tbody>
    </table>
</main>

</body>
</html>
